<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cursed MMO RPG - Полная игра</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            z-index: 100;
            pointer-events: none;
        }
        .btn {
            pointer-events: auto;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); background: orange; }
        #inventoryPanel, #craftPanel, #questPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px;
            border-radius: 20px;
            width: 280px;
            text-align: center;
            z-index: 200;
            display: none;
            border: 1px solid gold;
            pointer-events: auto;
        }
        .closeBtn {
            float: right;
            background: red;
            border: none;
            color: white;
            border-radius: 20px;
            cursor: pointer;
        }
        .itemSlot {
            background: #333;
            margin: 5px;
            padding: 8px;
            border-radius: 10px;
            display: inline-block;
            width: 80px;
        }
        .craftBtn {
            background: orange;
            margin: 5px;
            padding: 8px;
            border-radius: 20px;
            cursor: pointer;
        }
        #joystickZone {
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 60px;
            z-index: 50;
            touch-action: none;
        }
        #stats {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: lime;
            padding: 10px;
            border-radius: 10px;
            font-family: monospace;
            z-index: 100;
        }
        @media (max-width: 768px) { .btn { padding: 8px 12px; font-size: 12px; } }
    </style>
</head>
<body>
    <div id="stats">❤️ Здоровье: 100 | 🧪 Ресурсы: 0 | ⚔️ Убито мобов: 0</div>
    <div id="ui">
        <button class="btn" id="inventoryBtn">🎒 Инвентарь</button>
        <button class="btn" id="craftBtn">🔨 Крафт</button>
        <button class="btn" id="questBtn">📜 Квесты</button>
    </div>
    <div id="inventoryPanel"><button class="closeBtn" id="closeInv">X</button><h3>Инвентарь</h3><div id="invItems"></div></div>
    <div id="craftPanel"><button class="closeBtn" id="closeCraft">X</button><h3>Крафт</h3><div id="craftList"></div></div>
    <div id="questPanel"><button class="closeBtn" id="closeQuest">X</button><h3>Квесты</h3><div id="questList"></div></div>
    <div id="joystickZone"></div>

    <!-- Загрузка Three.js и дополнений -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
        
        // ---------- ИНИЦИАЛИЗАЦИЯ Three.js ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(10, 8, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        scene.add(dirLight);
        const backLight = new THREE.PointLight(0x5566ff, 0.3);
        backLight.position.set(0, 5, -5);
        scene.add(backLight);
        
        // Пол (большая карта)
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x3c9e3c, roughness: 0.8, metalness: 0.1 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Сетка для ориентира
        const gridHelper = new THREE.GridHelper(200, 40, 0x88ff88, 0x338833);
        gridHelper.position.y = -0.4;
        scene.add(gridHelper);
        
        // Деревья / декорации
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x3cac3c });
        for (let i = 0; i < 120; i++) {
            const x = (Math.random() - 0.5) * 180;
            const z = (Math.random() - 0.5) * 180;
            if (Math.hypot(x, z) < 5) continue;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.6, 0.8, 1.2), treeMat);
            trunk.position.set(x, -0.2, z);
            trunk.castShadow = true;
            const foliage = new THREE.Mesh(new THREE.ConeGeometry(0.9, 1.2, 6), leafMat);
            foliage.position.set(x, 0.6, z);
            foliage.castShadow = true;
            scene.add(trunk);
            scene.add(foliage);
        }
        
        // --- Игрок (сфера + меч) ---
        const playerGroup = new THREE.Group();
        const body = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200 }));
        body.castShadow = true;
        const sword = new THREE.Mesh(new THREE.BoxGeometry(0.2, 1.2, 0.2), new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.9 }));
        sword.position.set(0.8, 0.2, 0);
        playerGroup.add(body);
        playerGroup.add(sword);
        playerGroup.position.set(0, 0.2, 0);
        scene.add(playerGroup);
        
        // Имя игрока (CSS2D)
        const playerLabelDiv = document.createElement('div');
        playerLabelDiv.textContent = '🧙 Ты';
        playerLabelDiv.style.color = 'gold';
        playerLabelDiv.style.fontWeight = 'bold';
        playerLabelDiv.style.textShadow = '1px 1px black';
        const playerLabel = new CSS2DObject(playerLabelDiv);
        playerLabel.position.set(0, 1.2, 0);
        playerGroup.add(playerLabel);
        
        // --- Система состояния игрока ---
        let playerStats = { hp: 100, maxHp: 100, resources: 0, kills: 0 };
        let inventory = { 'wood': 0, 'stone': 0, 'iron': 0, 'potion': 0 };
        let quests = [{ id: 0, name: 'Убить 3 моба', desc: 'Награда: 5 ресурсов', required: 3, current: 0, reward: 5, completed: false }];
        
        function updateUI() {
            document.getElementById('stats').innerHTML = `❤️ Здоровье: ${playerStats.hp} | 🧪 Ресурсы: ${playerStats.resources} | ⚔️ Убито мобов: ${playerStats.kills}`;
        }
        
        // --- Мобы: генерируем 20 штук ---
        class Mob {
            constructor(scene, x, z, id) {
                this.scene = scene;
                this.id = id;
                this.group = new THREE.Group();
                const mobBody = new THREE.Mesh(new THREE.SphereGeometry(0.6, 24, 24), new THREE.MeshStandardMaterial({ color: 0xdd5555, emissive: 0x330000 }));
                mobBody.castShadow = true;
                const eyes = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
                eyes.position.set(0.3, 0.3, 0.6);
                const eye2 = eyes.clone();
                eye2.position.set(-0.3, 0.3, 0.6);
                this.group.add(mobBody);
                this.group.add(eyes);
                this.group.add(eye2);
                this.group.position.set(x, 0, z);
                scene.add(this.group);
                
                const lblDiv = document.createElement('div');
                lblDiv.textContent = `👾 Гоблин ${Math.floor(id)}`;
                lblDiv.style.color = '#ff8888';
                lblDiv.style.fontSize = '12px';
                this.label = new CSS2DObject(lblDiv);
                this.label.position.set(0, 1, 0);
                this.group.add(this.label);
                this.hp = 30;
                this.active = true;
            }
            takeDamage(amount) {
                this.hp -= amount;
                if (this.hp <= 0 && this.active) {
                    this.active = false;
                    this.scene.remove(this.group);
                    playerStats.kills++;
                    playerStats.resources += 2;
                    inventory.wood += 1;
                    updateUI();
                    // проверка квеста
                    const q = quests[0];
                    if (!q.completed && q.id === 0) {
                        q.current++;
                        if (q.current >= q.required) {
                            q.completed = true;
                            playerStats.resources += q.reward;
                            alert('✅ Квест выполнен! +5 ресурсов');
                            updateUI();
                        }
                    }
                    return true;
                }
                return false;
            }
            updatePosition(delta, playerPos) {
                if (!this.active) return;
                const dx = playerPos.x - this.group.position.x;
                const dz = playerPos.z - this.group.position.z;
                const dist = Math.hypot(dx, dz);
                if (dist < 8 && dist > 0.5) {
                    const move = 2.5 * delta;
                    const dirX = dx / dist;
                    const dirZ = dz / dist;
                    this.group.position.x += dirX * move;
                    this.group.position.z += dirZ * move;
                    // атака
                    if (dist < 1.2) {
                        playerStats.hp = Math.max(0, playerStats.hp - 15 * delta);
                        updateUI();
                        if (playerStats.hp <= 0) {
                            alert('💀 Вы погибли! Возрождение...');
                            playerStats.hp = playerStats.maxHp;
                            playerGroup.position.set(0, 0.2, 0);
                            updateUI();
                        }
                    }
                }
            }
        }
        
        let mobs = [];
        for (let i = 0; i < 22; i++) {
            let x = (Math.random() - 0.5) * 140;
            let z = (Math.random() - 0.5) * 140;
            if (Math.hypot(x, z) < 4) x += 6;
            mobs.push(new Mob(scene, x, z, i));
        }
        
        // --- Другие игроки (сеть через WebSocket простой сигналинг) ---
        // Используем публичный брокер WebSocket для демо (в реальном проекте свой сервер)
        // Но для оффлайн-демо или локальной сети: создадим фейк мультиплеер с ботами-игроками
        // Чтобы точно работало без сервера: добавим 3 бота, которые двигаются случайно
        class OtherPlayer {
            constructor(scene, id, x, z, color) {
                this.group = new THREE.Group();
                const pbody = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), new THREE.MeshStandardMaterial({ color: color }));
                pbody.castShadow = true;
                this.group.add(pbody);
                this.group.position.set(x, 0.2, z);
                scene.add(this.group);
                const div = document.createElement('div');
                div.textContent = `🧝 Игрок${id}`;
                div.style.color = '#aaffdd';
                this.label = new CSS2DObject(div);
                this.label.position.set(0, 1.2, 0);
                this.group.add(this.label);
                this.targetX = x;
                this.targetZ = z;
            }
            update(delta) {
                // случайное блуждание
                if (Math.random() < 0.02) {
                    this.targetX = this.group.position.x + (Math.random() - 0.5) * 8;
                    this.targetZ = this.group.position.z + (Math.random() - 0.5) * 8;
                    this.targetX = Math.min(85, Math.max(-85, this.targetX));
                    this.targetZ = Math.min(85, Math.max(-85, this.targetZ));
                }
                const dx = this.targetX - this.group.position.x;
                const dz = this.targetZ - this.group.position.z;
                const dist = Math.hypot(dx, dz);
                if (dist > 0.2) {
                    const move = 2.0 * delta;
                    this.group.position.x += (dx / dist) * move;
                    this.group.position.z += (dz / dist) * move;
                }
            }
        }
        let otherPlayers = [];
        for (let i = 1; i <= 3; i++) {
            otherPlayers.push(new OtherPlayer(scene, i, (Math.random() - 0.5)*60, (Math.random() - 0.5)*60, 0x77aaff));
        }
        
        // --- Управление: клавиатура + стик для телефона ---
        const moveState = { forward: false, backward: false, left: false, right: false };
        window.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'w': moveState.forward = true; break;
                case 's': moveState.backward = true; break;
                case 'a': moveState.left = true; break;
                case 'd': moveState.right = true; break;
            }
        });
        window.addEventListener('keyup', (e) => {
            switch(e.key) {
                case 'w': moveState.forward = false; break;
                case 's': moveState.backward = false; break;
                case 'a': moveState.left = false; break;
                case 'd': moveState.right = false; break;
            }
        });
        
        // Стик для телефона
        let joystickActive = false;
        let joystickVec = { x: 0, y: 0 };
        const stickZone = document.getElementById('joystickZone');
        const handleTouchStart = (e) => {
            e.preventDefault();
            joystickActive = true;
        };
        const handleTouchMove = (e) => {
            if (!joystickActive) return;
            const rect = stickZone.getBoundingClientRect();
            const touch = e.touches[0];
            let relX = (touch.clientX - rect.left) / rect.width - 0.5;
            let relY = (touch.clientY - rect.top) / rect.height - 0.5;
            const len = Math.hypot(relX, relY);
            if (len > 0.5) {
                relX /= len * 2;
                relY /= len * 2;
            }
            joystickVec.x = Math.min(0.5, Math.max(-0.5, relX)) * 2;
            joystickVec.y = Math.min(0.5, Math.max(-0.5, relY)) * 2;
        };
        const handleTouchEnd = () => {
            joystickActive = false;
            joystickVec = { x: 0, y: 0 };
        };
        stickZone.addEventListener('touchstart', handleTouchStart);
        stickZone.addEventListener('touchmove', handleTouchMove);
        stickZone.addEventListener('touchend', handleTouchEnd);
        
        // Камера от третьего лица
        let cameraAngle = 0;
        let cameraDist = 9;
        let cameraHeight = 4;
        
        // --- Крафт и инвентарь ---
        function refreshInventoryUI() {
            const invDiv = document.getElementById('invItems');
            invDiv.innerHTML = `🌲 Древесина: ${inventory.wood} | 🪨 Камень: ${inventory.stone} | ⛓️ Железо: ${inventory.iron} | 🧪 Зелье: ${inventory.potion}<br>🔧 Ресурсы: ${playerStats.resources}`;
        }
        function refreshCraftUI() {
            const craftDiv = document.getElementById('craftList');
            craftDiv.innerHTML = `
                <div class="craftBtn" data-craft="sword">🗡️ Железный меч (10 железа) → +10 силы (урон мобам)</div>
                <div class="craftBtn" data-craft="potion">🧪 Зелье лечения (5 травы/ресурсов) → +40 HP</div>
                <div class="craftBtn" data-craft="axe">🪓 Кирка (5 дерева+3 камня) → добыча +1 ресурс с моба</div>
            `;
            document.querySelectorAll('.craftBtn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const type = btn.dataset.craft;
                    if (type === 'potion' && playerStats.resources >= 5) {
                        playerStats.resources -= 5;
                        inventory.potion += 1;
                        alert('Сварено зелье!');
                    } else if (type === 'sword' && inventory.iron >= 10) {
                        inventory.iron -= 10;
                        playerStats.resources += 5;
                        alert('Вы скрафтили меч! +5 ресурсов');
                    } else if (type === 'axe' && inventory.wood >= 5 && inventory.stone >= 3) {
                        inventory.wood -= 5; inventory.stone -= 3;
                        playerStats.resources += 3;
                        alert('Кирка готова!');
                    } else alert('Не хватает материалов!');
                    refreshInventoryUI();
                });
            });
        }
        
        // Атака (по мобам)
        function attackNearMob() {
            const playerPos = playerGroup.position;
            let closest = null;
            let minDist = 2.5;
            for (let mob of mobs) {
                if (!mob.active) continue;
                const dist = playerPos.distanceTo(mob.group.position);
                if (dist < minDist) {
                    minDist = dist;
                    closest = mob;
                }
            }
            if (closest) {
                const killed = closest.takeDamage(25);
                if (killed) {
                    mobs = mobs.filter(m => m.active);
                    refreshInventoryUI();
                }
            } else {
                // добыча ресурсов с деревьев? просто для веселья
            }
        }
        
        // Квесты UI
        function refreshQuests() {
            const qDiv = document.getElementById('questList');
            const q = quests[0];
            qDiv.innerHTML = `<p>📜 ${q.name} (${q.current}/${q.required})<br>${q.desc}</p>
            ${q.completed ? '<span style="color:green;">✔️ Завершён!</span>' : ''}`;
        }
        
        // Кнопки UI
        document.getElementById('inventoryBtn').onclick = () => { refreshInventoryUI(); document.getElementById('inventoryPanel').style.display = 'block'; };
        document.getElementById('craftBtn').onclick = () => { refreshCraftUI(); document.getElementById('craftPanel').style.display = 'block'; };
        document.getElementById('questBtn').onclick = () => { refreshQuests(); document.getElementById('questPanel').style.display = 'block'; };
        document.getElementById('closeInv').onclick = () => document.getElementById('inventoryPanel').style.display = 'none';
        document.getElementById('closeCraft').onclick = () => document.getElementById('craftPanel').style.display = 'none';
        document.getElementById('closeQuest').onclick = () => document.getElementById('questPanel').style.display = 'none';
        
        // Атака по тапу на экран
        window.addEventListener('click', (e) => {
            if (e.target.closest('.btn') || e.target.closest('#joystickZone') || e.target.closest('.closeBtn')) return;
            attackNearMob();
        });
        
        // --- Анимация и движение ---
        let lastTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            
            // Движение игрока
            let moveX = 0, moveZ = 0;
            if (moveState.forward) moveZ -= 1;
            if (moveState.backward) moveZ += 1;
            if (moveState.left) moveX -= 1;
            if (moveState.right) moveX += 1;
            // Стик
            if (joystickActive) {
                moveX += joystickVec.x;
                moveZ -= joystickVec.y;
            }
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.hypot(moveX, moveZ);
                moveX /= len;
                moveZ /= len;
                const speed = 7.0 * delta;
                let newX = playerGroup.position.x + moveX * speed;
                let newZ = playerGroup.position.z + moveZ * speed;
                newX = Math.min(92, Math.max(-92, newX));
                newZ = Math.min(92, Math.max(-92, newZ));
                playerGroup.position.x = newX;
                playerGroup.position.z = newZ;
                // Поворот игрока
                const angleTo = Math.atan2(moveX, moveZ);
                playerGroup.rotation.y = angleTo;
            }
            
            // Обновление мобов
            for (let mob of mobs) {
                mob.updatePosition(delta, playerGroup.position);
            }
            // Обновление других игроков-ботов
            for (let op of otherPlayers) op.update(delta);
            
            // Камера вокруг игрока
            const targetPos = playerGroup.position.clone();
            const idealOffset = new THREE.Vector3(Math.sin(cameraAngle) * cameraDist, cameraHeight, Math.cos(cameraAngle) * cameraDist);
            camera.position.lerp(targetPos.clone().add(idealOffset), 0.1);
            camera.lookAt(targetPos);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // Инициализация мира и старт
        cameraAngle = Math.PI / 3;
        animate();
        
        // Pyodide часть: добавляем скриптовый моддинг для демонстрации (полностью играбельно и без питона, но интегрируем Pyodide для "магии")
        async function loadPyodideAndExtras() {
            let pyodide = await loadPyodide();
            await pyodide.runPythonAsync(`
import js
print("Pyodide активен! Можно писать скрипты для игры")
# Добавим функцию для крафта через Python
def py_craft_sword():
    if js.inventory.iron >= 10:
        js.inventory.iron -= 10
        js.playerStats.resources += 10
        js.updateUI()
        return "Выкован меч!"
    return "Не хватает железа"
js.py_craft_sword = py_craft_sword
            `);
            console.log("Pyodide готов, дополнительные крафты через Python доступны");
        }
        loadPyodideAndExtras();
        
        // Добавим авто-восстановление ресурсов
        setInterval(() => {
            if (playerStats.hp < playerStats.maxHp) playerStats.hp = Math.min(playerStats.maxHp, playerStats.hp + 2);
            updateUI();
        }, 3000);
        
        // Дроп ресурсов с мобов уже есть
        console.log("MMO RPG полностью загружена! Управление WASD или стик слева, тап по мобу - атака.");
    </script>
</body>
</html>
